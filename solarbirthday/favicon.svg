<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#131d40"/>
      <stop offset="100%" stop-color="#05060d"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6d5"/>
      <stop offset="45%" stop-color="#ffc24a"/>
      <stop offset="100%" stop-color="#ff7a18"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="earth" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#cdf3ff"/>
      <stop offset="55%" stop-color="#4fc8ff"/>
      <stop offset="100%" stop-color="#1566c8"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- orbit -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#ffca62" stroke-opacity="0.30" stroke-width="1"/>
  <!-- solar glow -->
  <circle cx="16" cy="16" r="11.5" fill="url(#glow)"/>
  <!-- sun -->
  <circle cx="16" cy="16" r="6.6" fill="url(#sun)"/>
  <!-- earth on its orbit -->
  <circle cx="23.78" cy="8.22" r="3.1" fill="#5de4ff" fill-opacity="0.28"/>
  <circle cx="23.78" cy="8.22" r="2.05" fill="url(#earth)"/>
</svg>
